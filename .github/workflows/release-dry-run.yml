name: release-dry-run

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  pack:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Validate
        run: npm run check

      - name: Pack CLI artifact
        run: npm pack --dry-run
