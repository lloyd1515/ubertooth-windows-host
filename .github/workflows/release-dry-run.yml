name: release-dry-run

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  pack:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Validate
        run: npm run check

      - name: Pack CLI artifact
        run: npm pack --dry-run

      - name: Upload Windows flash tools
        uses: actions/upload-artifact@v4
        with:
          name: windows-flash-tools
          path: build/windows-flash-tools/
          if-no-files-found: error

  release:
    runs-on: windows-latest
    needs: pack
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Validate
        run: npm run check

      - name: Create Windows flash tools archive
        run: Compress-Archive -Path build/windows-flash-tools/* -DestinationPath windows-flash-tools-${{ github.ref_name }}.zip
        shell: pwsh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: windows-flash-tools-${{ github.ref_name }}.zip
          generate_release_notes: true
